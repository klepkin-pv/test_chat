version: '3.8'

services:
  mongodb:
    image: mongo:4.4
    container_name: chatreal_mongodb
    restart: always
    ports:
      - "${MONGODB_PORT:-27018}:27017"
    environment:
      MONGO_INITDB_DATABASE: chatreal
    volumes:
      - ./data/mongodb:/data/db
    networks:
      - chatreal_network

  redis:
    image: redis:latest
    container_name: chatreal_redis
    restart: always
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - chatreal_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: chatreal_backend
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    environment:
      - APP_PROTOCOL=${APP_PROTOCOL:-http}
      - APP_HOST=${APP_HOST:-localhost}
      - PUBLIC_ORIGIN=${PUBLIC_ORIGIN:-http://localhost:5175}
      - NGINX_PORT=${NGINX_PORT:-5175}
      - FRONTEND_PORT=${FRONTEND_PORT:-5176}
      - PORT=${PORT:-4000}
      - MONGODB_PORT=${MONGODB_PORT:-27018}
      - REDIS_PORT=${REDIS_PORT:-6380}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/chatreal}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:5175}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./data/uploads:/app/uploads
    networks:
      - chatreal_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: chatreal_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5176}:${FRONTEND_PORT:-5176}"
    environment:
      - APP_PROTOCOL=${APP_PROTOCOL:-http}
      - APP_HOST=${APP_HOST:-localhost}
      - PUBLIC_ORIGIN=${PUBLIC_ORIGIN:-http://localhost:5175}
      - NGINX_PORT=${NGINX_PORT:-5175}
      - FRONTEND_PORT=${FRONTEND_PORT:-5176}
      - PORT=${PORT:-4000}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5175/api/chat}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-http://localhost:5175}
    depends_on:
      - backend
    networks:
      - chatreal_network

networks:
  chatreal_network:
    driver: bridge
