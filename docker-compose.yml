version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:latest
    container_name: chatreal_mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: chatreal
    volumes:
      - ./data/mongodb:/data/db
    networks:
      - chatreal_network

  # Redis
  redis:
    image: redis:latest
    container_name: chatreal_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - chatreal_network

  # Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: chatreal_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - MONGODB_URI=mongodb://mongodb:27017/chatreal
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost:3000
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./data/uploads:/app/uploads
    networks:
      - chatreal_network

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: chatreal_frontend
    restart: unless-stopped
    ports:
      - "5176:5176"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5175/api/chat
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:5175
      - PORT=5176
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - chatreal_network

volumes:
  mongodb_data:
  redis_data:

networks:
  chatreal_network:
    driver: bridge